<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join as Provider - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <img src="assets/logo.png">
        CitySetu
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html">Browse</a>
      </div>
    </nav>
  </div>
</header>

<div class="container">

  <h2 style="margin-top:60px; color: var(--primary-blue); text-align:center;">
    Create Your CitySetu Account
  </h2>
 
  <form id="joinForm">

    <!-- ACCOUNT TYPE -->
    <select id="accountType" required>
      <option value="">Select Account Type</option>
      <option value="customer">Customer</option>
      <option value="provider">Service Provider</option>
    </select>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="phone" placeholder="Phone Number" required>

    <!-- PROVIDER ONLY FIELDS -->
    <div id="providerFields" style="display:none;">

      <input type="text" id="category" placeholder="Service Category">

      <input type="number" id="priceStart" placeholder="Starting Price ₹">

    </div>

    <input type="password" id="password" placeholder="Create Password" required>

    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <button type="submit" class="btn btn-primary" style="width:100%;">
      Create Account
    </button>

  </form>

</div>

<footer>
  <div class="container">
    <div style="text-align:center;">
      © 2026 CitySetu
    </div>
  </div>
</footer>
<script>

const accountType = document.getElementById("accountType");
const providerFields = document.getElementById("providerFields");

accountType.addEventListener("change", () => {

  if(accountType.value === "provider"){
    providerFields.style.display = "block";
  } else {
    providerFields.style.display = "none";
  }

});

</script>
<script type="module" src="js/join.js"></script>
</body>
</html>
