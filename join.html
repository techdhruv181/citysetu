<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join as Provider - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7983632889924408"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <img src="assets/logo.png">
        CitySetu
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="categories.html">Browse</a>
      </div>
    </nav>
  </div>
</header>

<div class="container">

  <h2 style="margin-top:60px; color: var(--primary-blue); text-align:center;">
    Create Your CitySetu Account
  </h2>
 
  <form id="joinForm">

    <!-- ACCOUNT TYPE -->
    <select id="accountType" required>
      <option value="">Select Account Type</option>
      <option value="customer">Customer</option>
      <option value="provider">Service Provider</option>
    </select>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="phone" placeholder="Phone Number" required>

    <!-- PROVIDER ONLY FIELDS -->
    <div id="providerFields" style="display:none;">

      <select id="category" style="width:100%; margin-bottom:20px; padding:12px; border:1px solid #ddd; border-radius:8px;">
         <option value="">Select Service Category</option>
         <option value="Website Development">Website Development</option>
         <option value="Logo Design">Logo Design</option>
         <option value="Social Media Marketing">Social Media Marketing</option>
         <option value="College Project Help">College Project Help</option>
         <option value="AC Repair">AC Repair</option>
         <option value="Laptop Repair">Laptop Repair</option>
         <option value="Marketing">Marketing</option>
         <option value="Other">Other</option>
      </select>

      <input type="number" id="priceStart" placeholder="Starting Price ₹">

    </div>

    <input type="password" id="password" placeholder="Create Password" required>

    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <button type="submit" class="btn btn-primary" style="width:100%;">
      Create Account
    </button>

  </form>

</div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="container">
      <div class="grid">
        <div>
          <h4>CitySetu</h4>
          <p style="font-size:14px;">
            Connecting digital experts with customers in your city.
          </p>
        </div>
        <div>
          <h4>Company</h4>
          <a href="legal.html#about-us">About Us</a>
          <a href="#">Careers</a>
        </div>
        <div>
          <h4>Support</h4>
          <a href="#">Help Center</a>
          <a href="mailto:techdhruv181@gmail.com">Contact</a>
        </div>
        <div>
          <h4>Legal</h4>
          <a href="legal.html#terms">Terms</a>
          <a href="legal.html#privacy-policy">Privacy Policy</a>
        </div>
      </div>
      <div style="margin-top:40px; text-align:center; font-size:14px;">
        © 2026 CitySetu. All rights reserved.
      </div>
    </div>
  </footer>
<script>

const accountType = document.getElementById("accountType");
const providerFields = document.getElementById("providerFields");

accountType.addEventListener("change", () => {

  if(accountType.value === "provider"){
    providerFields.style.display = "block";
  } else {
    providerFields.style.display = "none";
  }

});

</script>
<script type="module" src="js/join.js"></script>
</body>
</html>
