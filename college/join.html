<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join as Provider - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <img src="logo.png">
        CitySetu
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="#">Browse</a>
      </div>
    </nav>
  </div>
</header>

<div class="container">
  <h2 style="margin-top:60px; color: var(--primary-blue); text-align:center;">
    Join as Service Provider
  </h2>

  <form id="joinForm">
  <input type="text" id="name" placeholder="Full Name" required>
  <input type="email" id="email" placeholder="Email Address" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <input type="text" id="category" placeholder="Service Category" required>
  <input type="number" id="priceStart" placeholder="Starting Price ₹" required>

  <input type="password" id="password" placeholder="Create Password" required>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

  <button type="submit" class="btn btn-primary" style="width:100%;">
    Submit Application
  </button>
</form>
</div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="container">
      <div class="grid">
        <div>
          <h4>CitySetu</h4>
          <p style="font-size:14px;">
            Connecting digital experts with customers in your city.
          </p>
        </div>
        <div>
          <h4>Company</h4>
          <a href="../legal.html#about-us">About Us</a>
          <a href="#">Careers</a>
        </div>
        <div>
          <h4>Support</h4>
          <a href="#">Help Center</a>
          <a href="mailto:techdhruv181@gmail.com">Contact</a>
        </div>
        <div>
          <h4>Legal</h4>
          <a href="../legal.html#terms">Terms</a>
          <a href="../legal.html#privacy-policy">Privacy Policy</a>
        </div>
      </div>
      <div style="margin-top:40px; text-align:center; font-size:14px;">
        © 2026 CitySetu. All rights reserved.
      </div>
    </div>
  </footer>

<script type="module" src="js/join.js"></script>
</body>
</html>
