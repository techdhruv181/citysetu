<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/logo.png">


  <meta charset="UTF-8">
  <title>Provider Profile - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7983632889924408" crossorigin="anonymous"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="CitySetu Logo" onerror="this.style.display='none'" loading="lazy">
        CitySetu
      </a>

      <button class="menu-toggle" id="mobileMenuBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>

      <div class="nav-links" id="navLinks">
        <a href="categories.html">Back to Services</a>
      </div>
    </nav>
  </div>
</header>

<div class="container" style="flex: 1; padding: 60px 0;">
  <div class="card" style="max-width: 600px; margin: 0 auto; text-align: center; padding: 50px 30px;">
    
    <div style="width: 100px; height: 100px; background: var(--primary-blue-light); color: var(--primary-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>

    <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 5px;">
      <h2 style="color: var(--text-dark); font-size: 28px; margin: 0;">Provider Name</h2>
      <span class="chip chip-new">Verified</span>
    </div>

    <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 15px;">Website Development</p>
    
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
      <div style="background: var(--bg-main); padding: 10px 20px; border-radius: var(--radius-md);">
        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Starting From</div>
        <div style="color: var(--primary-blue); font-weight: 700; font-size: 20px;">₹3000</div>
      </div>
      <div style="background: var(--bg-main); padding: 10px 20px; border-radius: var(--radius-md);">
        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Rating</div>
        <div style="color: var(--warning); font-weight: 700; font-size: 20px;">⭐ 5.0</div>
      </div>
    </div>

    <div style="display: flex; gap: 15px; justify-content: center; max-width: 400px; margin: 0 auto;">
      <button class="btn btn-primary" style="flex: 1; padding: 14px;">Book Now</button>
      <button class="btn btn-orange" style="flex: 1; padding: 14px; background: #25D366; box-shadow: 0 4px 14px 0 rgba(37, 211, 102, 0.25);">WhatsApp</button>
    </div>
  </div>
</div>

  <!-- ================= FOOTER ================= -->
  <footer style="margin-top: 0;">
    <div class="container">
      <div class="footer-bottom" style="margin-top: 0; padding-top: 0; border: none;">
        &copy; 2026 CitySetu. All rights reserved. Built for Ahmedabad.
      </div>
    </div>
  </footer>

<script>
  const menuBtn = document.getElementById('mobileMenuBtn');
  if(menuBtn) {
    menuBtn.addEventListener('click', function() {
      document.getElementById('navLinks').classList.toggle('show');
    });
  }
</script>
</body>
</html>
