<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/logo.png">


  <meta charset="UTF-8">
  <title>Forgot Password - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="CitySetu Logo" onerror="this.style.display='none'">
        CitySetu
      </a>
      <div class="nav-links">
        <a href="login.html">Back to Login</a>
      </div>
    </nav>
  </div>
</header>

<div class="container" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
  <div class="form-container" style="width: 100%; margin: 0;">
    <div style="text-align: center; margin-bottom: 30px;">
      <h2 style="color: var(--primary-blue); font-size: 28px; font-weight: 800; margin-bottom: 10px;">Reset Password</h2>
      <p style="color: var(--text-muted); font-size: 15px;">Enter your email and we'll send you a link to reset your password.</p>
    </div>

    <form id="forgotPasswordForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width:100%; padding: 14px; font-size: 16px;">
        Send Reset Link
      </button>
    </form>
    
    <div id="resetSuccess" style="display:none; text-align: center; margin-top: 20px; color: var(--success); font-weight: 500; background: var(--success-bg); padding: 15px; border-radius: var(--radius-sm);">
        Password reset link sent! Please check your email.
    </div>
    <div id="resetError" style="display:none; text-align: center; margin-top: 20px; color: var(--danger); font-weight: 500; background: var(--danger-bg); padding: 15px; border-radius: var(--radius-sm);">
        An error occurred. Please try again.
    </div>
  </div>
</div>

<footer style="margin-top: 0;">
  <div class="container">
    <div class="footer-bottom" style="margin-top: 0; padding-top: 0; border: none;">
      &copy; 2026 CitySetu. All rights reserved.
    </div>
  </div>
</footer>

<script type="module" src="js/forgot-password.js"></script>
</body>
</html>
