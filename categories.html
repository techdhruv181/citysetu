<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Browse Services - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="container">
    <nav>
      <div class="logo">
        <img src="assets/logo.png">
        CitySetu
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="join.html">Join</a>
        <a href="login.html">Login</a>
        <a href="#" id="myInboxBtn" style="display:none; color:var(--accent-orange); font-weight: bold;">📥 My Inbox</a>
      </div>
    </nav>
  </div>
</header>

<div class="container" style="margin-top:60px;">
  <div style="background: #eef2ffd9; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: center; border: 1px dashed var(--primary-blue);">
    <h3 style="color: var(--primary-blue);">Don't want to search? Let experts come to you!</h3>
    <a href="request-service.html" class="btn btn-primary" style="margin-top: 10px; display: inline-block;">Post a Free Service Request</a>
  </div>

  <h2 style="color: var(--primary-blue); margin-bottom: 30px;">
    Available Experts
  </h2>

  <div id="providerList" class="grid"></div>
</div>

<!-- BOOKING MODAL -->
<div id="bookingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
  <div style="background:white; width:400px; margin:100px auto; padding:20px; border-radius:10px;">
    <h3>Book Service</h3>
    <input type="text" id="customerName" placeholder="Your Name" required>
    <input type="text" id="customerPhone" placeholder="Phone Number" required>
    <textarea id="serviceDetails" placeholder="Service Details"></textarea>
    <button id="confirmBooking" class="btn btn-primary">Confirm</button>
    <button onclick="closeModal()" class="btn btn-orange">Cancel</button>
  </div>
<!-- CUSTOMER INBOX MODAL -->
<div id="inboxModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
  <div style="background:white; width:90%; max-width:600px; height:80vh; margin:auto; border-radius:10px; display:flex; flex-direction:column; overflow:hidden;">
    <div style="background:var(--primary-blue); padding:15px; color:white; display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0;">My Inbox</h3>
      <span id="closeInbox" style="cursor:pointer; font-size:24px;">&times;</span>
    </div>
    
    <div style="display:flex; height:100%;">
      <!-- Lead Threads Tab -->
      <div id="threadList" style="width:35%; border-right:1px solid #ddd; padding:10px; overflow-y:auto; background:#f9f9f9;">
         <p style="font-size:12px; color:#888;">Fetching requests...</p>
      </div>
      
      <!-- Live Chat Feed -->
      <div style="width:65%; display:flex; flex-direction:column; background:white;">
         <div id="inboxChatBody" style="flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column;">
            <p style="text-align:center; color:#888; margin-top:20px;">Select a request to start chatting.</p>
         </div>
         <div id="inboxInputArea" style="padding:15px; border-top:1px solid #ddd; display:none;">
            <input type="text" id="inboxReply" placeholder="Type message..." style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc; margin-bottom:10px;">
            <button id="inboxSendBtn" class="btn btn-primary" style="width:100%;">Send Reply</button>
         </div>
      </div>
    </div>
  </div>
</div>

<script>
function closeModal(){
  document.getElementById("bookingModal").style.display="none";
}
</script>

<footer>
  <div class="container">
    <div style="text-align:center;">
      © 2026 CitySetu. All rights reserved.
    </div>
  </div>
</footer>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/customer-chat.js"></script>
</body>
</html>
