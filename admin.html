<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - CitySetu</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/admin.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7983632889924408"
     crossorigin="anonymous"></script>
</head>

<body>

    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <img src="assets/logo.png">
                    CitySetu Admin
                </div>
                <div class="nav-links" id="navLinks">
                    <a href="index.html">Home</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container" style="margin-top:60px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:50px;">
            <h2>Leads Management</h2>
            <select id="leadFilter" style="padding:10px; border-radius:5px; border:1px solid #ccc;">
                <option value="All">All Services</option>
                <option value="Website Development">Website Development</option>
                <option value="Logo Design">Logo Design</option>
                <option value="Social Media Marketing">Social Media Marketing</option>
                <option value="College Project Help">College Project Help</option>
                <option value="Electrician">Electrician</option>
                <option value="Plumber">Plumber</option>
            </select>
        </div>
        <div id="leadList" class="grid" style="margin-bottom: 40px;"></div>
        <h2 style="color: var(--primary-blue);">
            Provider Approval Panel
        </h2>

        <p id="totalProviders"></p>

        <div id="adminProviderList" class="grid"></div>
    </div>
    <script type="module" src="js/toast.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>

</html>
