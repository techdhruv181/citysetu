<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provider Dashboard - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7983632889924408" crossorigin="anonymous"></script>
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">
          <img src="assets/logo.png" alt="CitySetu Logo" onerror="this.style.display='none'" loading="lazy">
          Provider Panel
        </a>

        <button class="menu-toggle" id="mobileMenuBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <!-- Auth links will be injected here by auth.js -->
        </div>
      </nav>
    </div>
  </header>

  <div class="container" style="margin-top:40px;">

    <!-- ================= STATS GRID ================= -->
    <div class="stats-grid">
      <div class="stat-card" style="border-left-color: var(--primary-blue); display: flex; flex-direction: column; justify-content: center;">
        <h3 id="statCredits" style="color: var(--primary-blue); font-size: 32px;">0</h3>
        <p style="font-weight: 600; color: var(--text-dark);">Lead Credits</p>
        <span id="statPlan" class="chip chip-new" style="align-self: flex-start; margin-top: 5px;">Free Plan</span>
      </div>
      <div class="stat-card">
        <h3 id="statAvailable">0</h3>
        <p>Available Leads</p>
      </div>
      <div class="stat-card" style="border-left-color: var(--warning);">
        <h3 id="statAssigned" style="color: var(--warning);">0</h3>
        <p>Active Jobs</p>
      </div>
      <div class="stat-card" style="border-left-color: var(--success);">
        <h3 id="statCompleted" style="color: var(--success);">0</h3>
        <p>Completed Jobs</p>
      </div>
    </div>

    <!-- ================= PROFILE SECTION ================= -->
    <div class="dashboard-header" style="margin-top: 50px;">
      <h2 style="display: flex; align-items: center; gap: 10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        My Profile
      </h2>
    </div>

    <div class="card" style="margin-bottom: 50px;">
      <form id="providerProfileForm">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
           <div class="form-group" style="margin: 0;">
             <label for="providerName">Full Name</label>
             <input type="text" id="providerName" placeholder="Your Name" required>
           </div>
           
           <div class="form-group" style="margin: 0;">
             <label for="providerPhone">Phone Number</label>
             <input type="tel" id="providerPhone" placeholder="Phone Number" required>
           </div>

           <div class="form-group" style="margin: 0;">
             <label for="providerPrice">Starting Price (₹)</label>
             <input type="number" id="providerPrice" placeholder="e.g. 1000" required>
           </div>
           
           <div class="form-group" style="margin: 0;">
             <label for="providerCategory">Service Category</label>
             <select id="providerCategory" required>
               <option value="Website Development">Website Development</option>
               <option value="Logo Design">Logo Design</option>
               <option value="Social Media Marketing">Social Media Marketing</option>
               <option value="College Project Help">College Project Help</option>
               <option value="AC Repair">AC Repair</option>
               <option value="Laptop Repair">Laptop Repair</option>
             </select>
           </div>
        </div>
        <button class="btn btn-primary" type="submit" style="margin-top: 25px;">
          Save Profile Changes
        </button>
      </form>
    </div>

    <!-- ================= LEADS SECTION ================= -->
    <div class="dashboard-header">
      <h2 style="display: flex; align-items: center; gap: 10px; color: var(--accent-orange);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
        Available Market Leads
      </h2>
    </div>
    <div id="availableList" class="grid" style="margin-bottom: 50px;"></div>
    
    <div class="dashboard-header">
      <h2 style="display: flex; align-items: center; gap: 10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        My Assigned Tasks
      </h2>
    </div>
    <div id="taskList" class="grid" style="margin-bottom: 60px;"></div>

    <!-- ================= PLANS SECTION ================= -->
    <div class="dashboard-header">
      <h2 style="display: flex; align-items: center; gap: 10px; color: var(--success);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Upgrade Subscription
      </h2>
    </div>
    <div id="providerPlanList" class="grid" style="margin-bottom: 60px;"></div>

  </div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="container">
      <div class="footer-bottom" style="margin-top: 0; padding-top: 0; border: none;">
        &copy; 2026 CitySetu Provider Portal. All rights reserved.
      </div>
    </div>
  </footer>

  <!-- ================= INTERNAL CHAT MODAL ================= -->
  <div id="internalChatModal" class="modal">
    <div class="chat-container">
      <div class="chat-header">
         <div style="display: flex; align-items: center; gap: 10px;">
           <div style="width: 30px; height: 30px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary-blue);">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
           </div>
           <span id="chatLeadName">Customer Chat</span>
         </div>
         <span id="closeInternalChat" style="cursor: pointer; font-size: 24px; line-height: 1;">&times;</span>
      </div>
      
      <div id="internalChatBody" class="chat-body">
         <!-- messages go here -->
      </div>
      
      <div class="chat-input-area" style="display:flex; gap:10px;">
         <input type="text" id="internalChatInput" placeholder="Type a message..." style="flex:1; margin:0;" />
         <button id="internalChatSend" class="btn btn-primary" style="margin:0; padding: 10px 16px;">
           <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
         </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/toast.js"></script>
  <script type="module" src="js/provider-dashboard.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    // Mobile Menu Toggle
    const menuBtn = document.getElementById('mobileMenuBtn');
    if(menuBtn) {
      menuBtn.addEventListener('click', function() {
        document.getElementById('navLinks').classList.toggle('show');
      });
    }
  </script>
</body>
</html>
