<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Dashboard - CitySetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

  <!-- ================= NAVBAR ================= -->
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">
          <img src="assets/logo.png" alt="CitySetu Logo" onerror="this.style.display='none'">
          Customer Panel
        </a>
        <button class="menu-toggle" id="mobileMenuBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="categories.html">Browse Services</a>
        </div>
      </nav>
    </div>
  </header>

  <div class="container" style="margin-top:40px; flex: 1;">

    <div class="dashboard-header" style="margin-bottom: 30px;">
      <h2 style="display: flex; align-items: center; gap: 10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary-blue)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        My Service Requests
      </h2>
      <a href="request-service.html" class="btn btn-primary" style="padding: 10px 20px;">+ New Request</a>
    </div>

    <div id="customerLeadsList" class="grid" style="margin-bottom: 60px;">
        <p style="text-align:center; grid-column:1/-1; color:var(--text-muted); padding: 40px;">Loading your requests...</p>
    </div>

  </div>

  <!-- ================= RATE PROVIDER MODAL ================= -->
  <div id="ratingModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
      <h3 style="color: var(--primary-blue); font-size: 22px; margin-bottom: 10px;">Rate the Provider</h3>
      <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">How was your experience with <span id="rateProviderName" style="font-weight:600;">this provider</span>?</p>
      
      <div style="font-size: 40px; margin-bottom: 20px; cursor: pointer;" id="starContainer">
        <span class="star" data-value="1" style="color: #ccc;">★</span>
        <span class="star" data-value="2" style="color: #ccc;">★</span>
        <span class="star" data-value="3" style="color: #ccc;">★</span>
        <span class="star" data-value="4" style="color: #ccc;">★</span>
        <span class="star" data-value="5" style="color: #ccc;">★</span>
      </div>
      
      <input type="hidden" id="selectedRating" value="0">
      <input type="hidden" id="ratingProviderId" value="">
      
      <div style="display: flex; gap: 15px;">
        <button id="submitRatingBtn" class="btn btn-primary" style="flex: 1;">Submit Review</button>
        <button onclick="document.getElementById('ratingModal').style.display='none'" class="btn btn-outline" style="flex: 1;">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer style="margin-top: 0;">
    <div class="container">
      <div class="footer-bottom" style="margin-top: 0; padding-top: 0; border: none;">
        &copy; 2026 CitySetu. All rights reserved.
      </div>
    </div>
  </footer>

  <script type="module" src="js/toast.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/customer-dashboard.js"></script>
  <script>
    const menuBtn = document.getElementById('mobileMenuBtn');
    if(menuBtn) {
      menuBtn.addEventListener('click', function() {
        document.getElementById('navLinks').classList.toggle('show');
      });
    }
  </script>
</body>
</html>
